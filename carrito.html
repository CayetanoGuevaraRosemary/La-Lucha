<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carrito - La Lucha</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link rel="icon" type="image/png" href="img/favicon.png">
<link href="css/style.css" rel="stylesheet">
</head>
<body data-page="carrito">

<script src="js/header.js"></script>

<section class="page-spacer">
  <div class="container">
    <h2 class="titulo-seccion">Tu Carrito</h2>
    <div class="table-responsive">
      <table class="table align-middle bg-white shadow-sm">
        <thead style="background:var(--negro);color:#fff;">
          <tr><th>Producto</th><th>Cant.</th><th>Precio</th><th>Subtotal</th><th></th></tr>
        </thead>
        <tbody id="filasCarrito"></tbody>
      </table>
    </div>
    <div id="vacioMsg" class="text-center text-muted py-4" style="display:none;">Tu carrito está vacío. Ve a <a href="servicios.html">Productos</a> y agrega algo rico 🥪</div>
    <div class="text-end">
      <h4>Total: <span class="precio" id="totalCarrito">S/0.00</span></h4>
      <a href="#" class="btn btn-lucha btn-lg mt-2">Finalizar Pedido</a>
    </div>
  </div>
</section>

<script src="js/footer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/cart.js"></script>
<script>
function pintarCarrito(){
  var cart = getCart();
  var tbody = document.getElementById('filasCarrito');
  var total = 0;
  if(cart.length === 0){
    document.getElementById('vacioMsg').style.display = 'block';
    tbody.innerHTML = '';
  } else {
    document.getElementById('vacioMsg').style.display = 'none';
    tbody.innerHTML = cart.map(function(p, i){
      var sub = p.precio * p.cant;
      total += sub;
      return `<tr>
        <td>${p.nombre}</td>
        <td><input type="number" class="form-control form-control-sm" style="width:70px" value="${p.cant}" min="1" onchange="cambiarCant(${i}, this.value)"></td>
        <td>S/${p.precio.toFixed(2)}</td>
        <td>S/${sub.toFixed(2)}</td>
        <td><button class="btn btn-sm btn-outline-danger" onclick="quitarItem(${i})">✕</button></td>
      </tr>`;
    }).join('');
  }
  document.getElementById('totalCarrito').textContent = 'S/' + total.toFixed(2);
}
function cambiarCant(i, val){
  var cart = getCart();
  cart[i].cant = Math.max(1, parseInt(val) || 1);
  saveCart(cart);
  pintarCarrito();
}
function quitarItem(i){
  var cart = getCart();
  cart.splice(i,1);
  saveCart(cart);
  pintarCarrito();
}
document.addEventListener('DOMContentLoaded', pintarCarrito);
</script>
</body>
</html>
