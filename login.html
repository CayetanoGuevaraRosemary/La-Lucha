<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ingresar - La Lucha</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link rel="icon" type="image/png" href="img/favicon.png">
<link href="css/style.css" rel="stylesheet">
</head>
<body data-page="login">

<script src="js/header.js"></script>

<section class="page-spacer">
  <div class="container" style="max-width:430px;">
    <h2 class="titulo-seccion">Ingresar</h2>
    <div class="card-lucha p-4">
      <form onsubmit="return false;">
        <div class="mb-3">
          <label class="form-label">Correo</label>
          <input type="email" class="form-control" placeholder="tucorreo@ejemplo.com">
        </div>
        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input type="password" class="form-control" placeholder="••••••••">
        </div>
        <button class="btn btn-lucha w-100 mb-3" type="submit">Iniciar sesión</button>
        <p class="text-center small text-muted mb-0">¿No tienes cuenta? <a href="#" class="text-danger">Regístrate</a></p>
      </form>
    </div>
  </div>
</section>

<script src="js/footer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/cart.js"></script>
</body>
</html>
