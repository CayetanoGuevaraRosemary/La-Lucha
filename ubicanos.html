<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ubícanos - La Lucha</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link rel="icon" type="image/png" href="img/favicon.png">
<link href="css/style.css" rel="stylesheet">
</head>
<body data-page="ubicanos">

<script src="js/header.js"></script>

<section class="page-spacer">
  <div class="container">
    <h2 class="titulo-seccion">Estamos Aquí</h2>
    <div class="row">
      <div class="col-lg-5 mb-4">
        <div id="contSedes" style="max-height:520px;overflow-y:auto;padding-right:6px;"></div>
      </div>
      <div class="col-lg-7 mb-4">
        <div class="ratio ratio-4x3 rounded shadow">
          <iframe id="mapaFrame" src="" style="border:0;" allowfullscreen loading="lazy"></iframe>
        </div>
      </div>
    </div>
  </div>
</section>

<script src="js/footer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/cart.js"></script>
<script>
var sedes = [
  // PERÚ
  {pais:'Perú', distrito:'Miraflores', nombre:'Pasaje Champagnat 139', q:'Pasaje Champagnat 139 Miraflores Lima Peru'},
  {pais:'Perú', distrito:'Miraflores', nombre:'Av. Diagonal 308', q:'Av. Diagonal 308 Miraflores Lima Peru'},
  {pais:'Perú', distrito:'Miraflores', nombre:'Av. José Larco 999', q:'Av. Jose Larco 999 Miraflores Lima Peru'},
  {pais:'Perú', distrito:'Miraflores', nombre:'Av. José Larco 497', q:'Av. Jose Larco 497 Miraflores Lima Peru'},
  {pais:'Perú', distrito:'Miraflores', nombre:'Av. Santa Cruz 847', q:'Av. Santa Cruz 847 Miraflores Lima Peru'},
  {pais:'Perú', distrito:'Miraflores', nombre:'C.C. Larcomar', q:'Larcomar Miraflores Lima Peru'},
  {pais:'Perú', distrito:'San Miguel', nombre:'Av. de la Marina 790', q:'Av. de la Marina 790 San Miguel Lima Peru'},
  {pais:'Perú', distrito:'San Miguel', nombre:'C.C. Plaza San Miguel', q:'Plaza San Miguel Lima Peru'},
  {pais:'Perú', distrito:'Santiago de Surco', nombre:'Av. El Polo 709', q:'Av. El Polo 709 Surco Lima Peru'},
  {pais:'Perú', distrito:'Surquillo', nombre:'Calle Manuel Gonzáles Prada 501', q:'Calle Manuel Gonzales Prada 501 Surquillo Lima Peru'},
  {pais:'Perú', distrito:'Cercado de Lima', nombre:'C.C. Real Plaza Centro Cívico', q:'Real Plaza Centro Civico Lima Peru'},
  {pais:'Perú', distrito:'Independencia', nombre:'C.C. Plaza Norte', q:'Plaza Norte Independencia Lima Peru'},
  {pais:'Perú', distrito:'Santa Anita', nombre:'Mall Aventura Santa Anita', q:'Mall Aventura Santa Anita Lima Peru'},
  {pais:'Perú', distrito:'Arequipa', nombre:'Calle Mercaderes 116-118', q:'Calle Mercaderes 116 Arequipa Peru'},
  {pais:'Perú', distrito:'Cayma - Arequipa', nombre:'Mall Plaza Cayma', q:'Mall Plaza Cayma Arequipa Peru'},
  {pais:'Perú', distrito:'Trujillo', nombre:'Mallplaza Trujillo', q:'Mallplaza Trujillo Peru'},
  // COLOMBIA
  {pais:'Colombia', distrito:'Chapinero - Bogotá', nombre:'Calle 93 # 12-19', q:'Calle 93 #12-19 Bogota Colombia'},
  {pais:'Colombia', distrito:'Chapinero - Bogotá', nombre:'Calle 85 # 12-44', q:'Calle 85 #12-44 Bogota Colombia'},
  {pais:'Colombia', distrito:'Usaquén - Bogotá', nombre:'C.C. Unicentro', q:'Unicentro Bogota Colombia'},
  {pais:'Colombia', distrito:'Usaquén - Bogotá', nombre:'C.C. Parque La Colina', q:'Parque La Colina Bogota Colombia'},
  {pais:'Colombia', distrito:'Teusaquillo - Bogotá', nombre:'C.C. Plaza Claro', q:'Plaza Claro Bogota Colombia'},
  {pais:'Colombia', distrito:'Fontibón - Bogotá', nombre:'C.C. Mallplaza NQS', q:'Mallplaza NQS Bogota Colombia'},
  // CHILE
  {pais:'Chile', distrito:'Providencia - Santiago', nombre:'C.C. Costanera Center', q:'Costanera Center Santiago Chile'},
  {pais:'Chile', distrito:'Las Condes - Santiago', nombre:'Av. Vitacura 3565', q:'Av. Vitacura 3565 Santiago Chile'},
  // MÉXICO
  {pais:'México', distrito:'Polanco - CDMX', nombre:'Calle Emilio Castelar 111', q:'Calle Emilio Castelar 111 Polanco CDMX Mexico'}
];

function pintarMapa(q){
  document.getElementById('mapaFrame').src = 'https://www.google.com/maps?q=' + encodeURIComponent(q) + '&output=embed';
}

function renderSedes(){
  var cont = document.getElementById('contSedes');
  var paisActual = '';
  sedes.forEach(function(s, i){
    if(s.pais !== paisActual){
      paisActual = s.pais;
      var tit = document.createElement('h6');
      tit.className = 'text-muted mb-2 mt-3';
      tit.innerHTML = '<i class="material-icons align-middle" style="font-size:1rem">public</i> ' + s.pais;
      cont.appendChild(tit);
    }
    var item = document.createElement('div');
    item.className = 'mapa-item d-flex justify-content-between align-items-center';
    item.style.cursor = 'pointer';
    item.innerHTML = '<span><i class="material-icons align-middle" style="font-size:1.1rem;color:var(--rojo)">location_on</i> ' +
      '<strong>' + s.distrito + '</strong><br><span class="small">' + s.nombre + '</span></span>';
    item.onclick = function(){ pintarMapa(s.q); marcarActivo(item); };
    cont.appendChild(item);
  });
}
function marcarActivo(el){
  document.querySelectorAll('.mapa-item').forEach(function(i){ i.classList.remove('mapa-activo'); });
  el.classList.add('mapa-activo');
}

renderSedes();
pintarMapa(sedes[0].q);
document.querySelector('.mapa-item').classList.add('mapa-activo');
</script>
</body>
</html>
