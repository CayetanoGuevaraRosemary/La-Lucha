<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Contacto - La Lucha</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link rel="icon" type="image/png" href="img/favicon.png">
<link href="css/style.css" rel="stylesheet">
</head>
<body data-page="contacto">

<script src="js/header.js"></script>

<section class="page-spacer">
  <div class="container">
    <h2 class="titulo-seccion">Contáctanos</h2>
    <div class="row g-4">
      <div class="col-md-5">
        <div class="card-lucha p-4 h-auto">
          <p><i class="material-icons align-middle" style="color:var(--rojo)">call</i> (601) 000-0000</p>
          <p><i class="material-icons align-middle" style="color:var(--rojo)">mail</i> contacto@lalucha.com</p>
          <p><i class="material-icons align-middle" style="color:var(--rojo)">schedule</i> D-J 8am-1am / V-S 8am-3am</p>
          <p class="mb-0"><i class="material-icons align-middle" style="color:var(--rojo)">share</i> @laluchasangucheria</p>
        </div>
      </div>
      <div class="col-md-7">
        <form onsubmit="return false;" class="card-lucha p-4">
          <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" placeholder="Tu nombre">
          </div>
          <div class="mb-3">
            <label class="form-label">Correo</label>
            <input type="email" class="form-control" placeholder="tucorreo@ejemplo.com">
          </div>
          <div class="mb-3">
            <label class="form-label">Mensaje</label>
            <textarea class="form-control" rows="4" placeholder="Cuéntanos en qué te ayudamos"></textarea>
          </div>
          <button class="btn btn-lucha" type="submit">Enviar mensaje</button>
        </form>
      </div>
    </div>
  </div>
</section>

<script src="js/footer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/cart.js"></script>
</body>
</html>
